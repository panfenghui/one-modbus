name: Build & Release

# 传输策略（永久生效）
# 国际上传只做一次（美国 → Gitee），后续国内全并行分发，不再重复跨海
# GitHub 编译 → Gitee（唯一跨海）→ GitCode 等国内平台从 Gitee CDN 取
#
# ┌─ GitHub（美国编译）──────┐
# │  ① 编译 .exe            │
# │  ② 创建 GitHub Release   │
# └────────┬─────────────────┘
#          ↓ 唯一一次国际上传
# ┌─ Gitee（国内）───────────┐
# │  ③ 上传 .exe（跨海）      │
# └────────┬─────────────────┘
#    ┌─────┴──────┐  ← 国内全并行
#    ↓            ↓
# GitCode   (未来其他平台)

on:
  push:
    branches: [master]
    tags:
      - 'v*'

jobs:
  build:
    name: Build Windows EXE
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install mingw-w64 (CGO cross-compiler for go-sqlite3)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 mingw-w64-tools

      - name: Init go.mod
        run: |
          go mod init modbusrtu_broker
          go mod tidy

      - name: Build EXE (CGO cross-compile for go-sqlite3)
        run: |
          BUILD_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')
          sed -i "s/编译时间: [0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\} [0-9]\{2\}:[0-9]\{2\}/编译时间: ${BUILD_TIME}/" modbusrtu_broker.go
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 CC=x86_64-w64-mingw32-gcc \
          CGO_CFLAGS="-D_WIN32" CGO_LDFLAGS="-lws2_32" \
          go build -ldflags '-s -w -extldflags=-static' -o modbusrtu_broker.exe modbusrtu_broker.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: one-modbus-windows-amd64
          path: modbusrtu_broker.exe

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: one-modbus-windows-amd64

      - name: Generate release notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "# one-modbus $VERSION" > release_notes.md
          echo "" >> release_notes.md
          echo "- Windows amd64 单文件 exe，无需安装，解压即用" >> release_notes.md
          echo "- 配置方法：同级目录放 项目变量信息.xlsx（没有会自动生成模板）" >> release_notes.md
          echo "- 双击 modbusrtu_broker.exe 启动" >> release_notes.md
          echo "- 浏览器打开 http://127.0.0.1:53046/统计 即可进入" >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: one-modbus ${{ github.ref_name }}
          body_path: release_notes.md
          files: modbusrtu_broker.exe
          draft: false
          prerelease: false

      - name: Upload release notes for downstream jobs
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release_notes.md

  sync-gitee:
    name: Sync to Gitee
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: one-modbus-windows-amd64
      - uses: actions/download-artifact@v4
        with:
          name: release-notes
      - name: Upload to Gitee
        env:
          TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # 用 jq 构建 JSON body，避免 shell 转义问题
          jq -n --arg tag "$TAG" --arg name "one-modbus $TAG" \
            --arg body "$(cat release_notes.md)" \
            '{access_token: env.TOKEN, tag_name: $tag, name: $name, body: $body, target_commitish: "master"}' \
            > /tmp/gitee_release_payload.json

          echo "Create Gitee release..."
          RESP=$(curl -s --connect-timeout 30 --max-time 60 -X POST \
            "https://gitee.com/api/v5/repos/dingjiazhi/one-modbus/releases" \
            -H "Content-Type: application/json" \
            -d @/tmp/gitee_release_payload.json)
          RID=$(echo "$RESP" | jq -r '.id // "null"')
          if [ "$RID" != "null" ]; then
            echo "Upload exe to Gitee (跨海 22MB, 最长 10min)..."
            curl -s --connect-timeout 30 --max-time 600 -X POST \
              "https://gitee.com/api/v5/repos/dingjiazhi/one-modbus/releases/${RID}/attach_files" \
              -F "access_token=${TOKEN}" \
              -F "file=@modbusrtu_broker.exe"
          else
            echo "Gitee response: $RESP"
          fi

  sync-gitcode:
    name: Sync to GitCode (artifact + Gitee CDN)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, release, sync-gitee]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: one-modbus-windows-amd64
      - uses: actions/download-artifact@v4
        with:
          name: release-notes

      - name: Upload release notes to GitCode
        env:
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
        run: |
          set -e
          TAG="${GITHUB_REF#refs/tags/}"

          # 构建 release payload
          jq -n --arg tag "$TAG" --arg name "one-modbus $TAG" \
            --arg body "$(cat release_notes.md)" \
            '{tag_name: $tag, name: $name, body: $body, target_commitish: "master"}' \
            > /tmp/gitcode_release_payload.json

          # 先检查是否已有同名 release（GitCode API 返回无 id 字段，靠 tag_name 判断）
          echo "::group::Check/reconcile GitCode release for ${TAG}"
          EXISTING=$(curl -sS --connect-timeout 30 --max-time 30 \
            "https://api.gitcode.com/api/v5/repos/weixin_45444393/one-modbus/releases/tags/${TAG}" \
            -H "Authorization: Bearer ${GITCODE_TOKEN}")
          EXISTING_TAG=$(echo "$EXISTING" | jq -r '.tag_name // empty')
          echo "::endgroup::"

          if [ "$EXISTING_TAG" = "$TAG" ]; then
            echo "Release ${TAG} already exists, updating via PUT..."
            RESP=$(curl -sS --connect-timeout 30 --max-time 60 -X PUT \
              "https://api.gitcode.com/api/v5/repos/weixin_45444393/one-modbus/releases/${TAG}" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${GITCODE_TOKEN}" \
              -d @/tmp/gitcode_release_payload.json)
            echo "Update response:"
            echo "$RESP" | jq '{tag_name, name, message}' 2>/dev/null || echo "$RESP"
          else
            echo "Release ${TAG} not found, creating via POST..."
            RESP=$(curl -sS --connect-timeout 30 --max-time 60 -X POST \
              "https://api.gitcode.com/api/v5/repos/weixin_45444393/one-modbus/releases" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${GITCODE_TOKEN}" \
              -d @/tmp/gitcode_release_payload.json)
            echo "Create response:"
            echo "$RESP" | jq '{tag_name, name, message}' 2>/dev/null || echo "$RESP"
          fi

      - name: Upload exe to GitCode (from Gitee CDN, fallback to artifact)
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
        run: |
          set -e
          TAG="${GITHUB_REF#refs/tags/}"

          # 优先从 Gitee CDN 下载 exe（国内快），失败才用 artifact
          echo "::group::Download exe for GitCode upload"
          echo "Try to download exe from Gitee CDN..."
          GITEE_INFO=$(curl -s "https://gitee.com/api/v5/repos/dingjiazhi/one-modbus/releases/tags/${TAG}")
          EXE_URL=$(echo "$GITEE_INFO" | jq -r '.assets[] | select(.name | endswith(".exe")) | .browser_download_url // empty')
          if [ -n "$EXE_URL" ]; then
            echo "Download from Gitee CDN: $EXE_URL"
            curl -sL -o /tmp/modbusrtu_broker.exe "$EXE_URL"
          else
            echo "Gitee CDN not available, use local artifact"
            cp modbusrtu_broker.exe /tmp/modbusrtu_broker.exe
          fi
          ls -la /tmp/modbusrtu_broker.exe
          echo "::endgroup::"

          # GitCode API 上传附件需指定 file_name，返回的 headers 也要带上
          echo "::group::Get GitCode upload URL by tag name..."
          UPLOAD_RESP=$(curl -sS --connect-timeout 30 --max-time 30 \
            "https://api.gitcode.com/api/v5/repos/weixin_45444393/one-modbus/releases/${TAG}/upload_url?file_name=modbusrtu_broker.exe" \
            -H "Authorization: Bearer ${GITCODE_TOKEN}")
          UPLOAD_URL=$(echo "$UPLOAD_RESP" | jq -r '.url // empty')
          # 提取需要的请求头
          OBS_ACL=$(echo "$UPLOAD_RESP" | jq -r '.headers["x-obs-acl"] // empty')
          OBS_PROJECT_ID=$(echo "$UPLOAD_RESP" | jq -r '.headers["x-obs-meta-project-id"] // empty')
          OBS_CALLBACK=$(echo "$UPLOAD_RESP" | jq -r '.headers["x-obs-callback"] // empty')
          echo "Upload URL: ${UPLOAD_URL:0:80}..."
          echo "::endgroup::"

          if [ -z "$UPLOAD_URL" ]; then
            echo "ERROR: Failed to get upload URL."
            exit 1
          fi

          echo "::group::Upload exe to GitCode..."
          UPLOAD_RESP=$(curl -sS --connect-timeout 30 --max-time 120 -X PUT "$UPLOAD_URL" \
            -H "Content-Type: application/octet-stream" \
            -H "x-obs-acl: ${OBS_ACL}" \
            -H "x-obs-meta-project-id: ${OBS_PROJECT_ID}" \
            -H "x-obs-callback: ${OBS_CALLBACK}" \
            --data-binary "@/tmp/modbusrtu_broker.exe")
          echo "$UPLOAD_RESP" | jq '{name, size, state, message}' 2>/dev/null || echo "$UPLOAD_RESP"
          echo "::endgroup::"
          echo "✅ GitCode upload complete"
