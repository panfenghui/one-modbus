name: Build & Release

on:
  push:
    branches: [master]
    tags:
      - 'v*'

jobs:
  build:
    name: Build Windows EXE
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Init go.mod
        run: |
          go mod init modbusrtu_broker
          go mod tidy

      - name: Build EXE (Go cross-compile, no CGO needed)
        run: |
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 \
          go build -ldflags '-s -w' -o modbusrtu_broker.exe modbusrtu_broker.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: one-modbus-windows-amd64
          path: modbusrtu_broker.exe

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: one-modbus-windows-amd64

      - name: Generate release notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "# one-modbus $VERSION" > release_notes.md
          echo "" >> release_notes.md
          echo "- Windows amd64 单文件 exe，无需安装，解压即用" >> release_notes.md
          echo "- 配置方法：同级目录放 项目变量信息.xlsx（没有会自动生成模板）" >> release_notes.md
          echo "- 双击 modbusrtu_broker.exe 启动" >> release_notes.md
          echo "- 浏览器打开 http://127.0.0.1:53046/统计 即可进入" >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: one-modbus ${{ github.ref_name }}
          body_path: release_notes.md
          files: modbusrtu_broker.exe
          draft: false
          prerelease: false
