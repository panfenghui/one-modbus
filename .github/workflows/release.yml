name: Build & Release

on:
  push:
    branches: [master]
    tags:
      - 'v*'

jobs:
  build:
    name: Build Windows EXE
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install mingw-w64 (CGO cross-compiler for go-sqlite3)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 mingw-w64-tools

      - name: Init go.mod
        run: |
          go mod init modbusrtu_broker
          go mod tidy

      - name: Build EXE (CGO cross-compile for go-sqlite3)
        run: |
          BUILD_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')
          sed -i "s/编译时间: [0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\} [0-9]\{2\}:[0-9]\{2\}/编译时间: ${BUILD_TIME}/" modbusrtu_broker.go
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 CC=x86_64-w64-mingw32-gcc \
          CGO_CFLAGS="-D_WIN32" CGO_LDFLAGS="-lws2_32" \
          go build -ldflags '-s -w -extldflags=-static' -o modbusrtu_broker.exe modbusrtu_broker.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: one-modbus-windows-amd64
          path: modbusrtu_broker.exe

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: one-modbus-windows-amd64

      - name: Generate release notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "# one-modbus $VERSION" > release_notes.md
          echo "" >> release_notes.md
          echo "- Windows amd64 单文件 exe，无需安装，解压即用" >> release_notes.md
          echo "- 配置方法：同级目录放 项目变量信息.xlsx（没有会自动生成模板）" >> release_notes.md
          echo "- 双击 modbusrtu_broker.exe 启动" >> release_notes.md
          echo "- 浏览器打开 http://127.0.0.1:53046/统计 即可进入" >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: one-modbus ${{ github.ref_name }}
          body_path: release_notes.md
          files: modbusrtu_broker.exe
          draft: false
          prerelease: false

      - name: Upload release notes for downstream jobs
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release_notes.md

  sync-gitee:
    name: Sync to Gitee
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: one-modbus-windows-amd64
      - uses: actions/download-artifact@v4
        with:
          name: release-notes
      - name: Upload to Gitee
        env:
          TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          BODY=$(cat release_notes.md | jq -Rs .)
          echo "Create Gitee release..."
          RESP=$(curl -s -X POST "https://gitee.com/api/v5/repos/dingjiazhi/one-modbus/releases" \
            -H "Content-Type: application/json" \
            -d "{\"access_token\":\"${TOKEN}\",\"tag_name\":\"${TAG}\",\"name\":\"one-modbus ${TAG}\",\"body\":${BODY},\"target_commitish\":\"master\"}")
          RID=$(echo "$RESP" | jq -r '.id // "null"')
          if [ "$RID" != "null" ]; then
            echo "Upload exe to Gitee..."
            curl -s -X POST "https://gitee.com/api/v5/repos/dingjiazhi/one-modbus/releases/${RID}/attach_files" \
              -F "access_token=${TOKEN}" \
              -F "file=@modbusrtu_broker.exe"
          else
            echo "Gitee response: $RESP"
          fi

  sync-gitcode:
    name: Sync to GitCode (via Gitee CDN)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, release, sync-gitee]
    runs-on: ubuntu-latest
    steps:
      - name: Download exe from Gitee (国内快), then upload to GitCode
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Download exe from Gitee release (国内快)..."
          # 获取 Gitee Release 中 .exe 的下载地址
          GITEE_INFO=$(curl -s "https://gitee.com/api/v5/repos/dingjiazhi/one-modbus/releases/tags/${TAG}")
          EXE_URL=$(echo "$GITEE_INFO" | jq -r '.assets[] | select(.name | endswith(".exe")) | .browser_download_url // empty')
          echo "Download URL: $EXE_URL"
          if [ -z "$EXE_URL" ]; then
            echo "No exe found in Gitee release, falling back to local artifact"
            EXE_URL="modbusrtu_broker.exe"
          fi
          curl -sL -o /tmp/modbusrtu_broker.exe "$EXE_URL"
          ls -la /tmp/modbusrtu_broker.exe
          
          echo "Create GitCode release via v5 API..."
          BODY=$(cat release_notes.md 2>/dev/null || echo '{"body":"### one-modbus '"$TAG"'"}')
          curl -s --connect-timeout 30 --max-time 60 -X POST "https://api.gitcode.com/api/v5/repos/weixin_45444393/one-modbus/releases" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${GITCODE_TOKEN}" \
            -d "{\"tag_name\":\"${TAG}\",\"name\":\"one-modbus ${TAG}\",\"body\":${BODY},\"target_commitish\":\"master\"}"
          echo ""
          echo "Get upload URL..."
          UPLOAD_URL=$(curl -s --connect-timeout 30 --max-time 30 \
            "https://api.gitcode.com/api/v5/repos/weixin_45444393/one-modbus/releases/${TAG}/upload_url" \
            -H "Authorization: Bearer ${GITCODE_TOKEN}" | jq -r '.upload_url // empty')
          echo "Upload URL: $UPLOAD_URL"
          if [ -n "$UPLOAD_URL" ]; then
            echo "Upload exe to GitCode..."
            curl -s --connect-timeout 30 --max-time 120 -X PUT "$UPLOAD_URL" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@/tmp/modbusrtu_broker.exe"
          else
            echo "No upload URL, upload failed"
          fi
