<svg viewBox="0 0 680 590" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="one-modbus system architecture">
  <title>one-modbus system architecture</title>
  <desc>Four-layer architecture: notification, service, core engine via Modbus RTU, connecting directly to Modbus RTU devices or via purchased protocol converters to non-Modbus devices</desc>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Notification Layer -->
  <rect x="60" y="30" width="560" height="90" rx="16" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <rect x="80" y="46" width="100" height="28" rx="8" fill="#CECBF6"/>
  <text x="130" y="60" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#3C3489">通知层</text>
  <text x="130" y="102" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#534AB7" font-weight="500">Outbound</text>
  <text x="260" y="80" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" fill="#3C3489">企业微信机器人</text>
  <text x="400" y="80" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" fill="#3C3489">微信报警推送</text>
  <text x="530" y="80" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" fill="#3C3489">邮件 · 定时报表</text>
  <line x1="340" y1="120" x2="340" y2="150" stroke="#888780" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- HTTP Service Layer -->
  <rect x="60" y="155" width="560" height="90" rx="16" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <rect x="80" y="171" width="100" height="28" rx="8" fill="#B5D4F4"/>
  <text x="130" y="185" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#185FA5">服务层</text>
  <text x="130" y="227" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#378ADD" font-weight="500">HTTP</text>
  <text x="260" y="205" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" fill="#185FA5">REST API · 文件服务器</text>
  <text x="450" y="205" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" fill="#185FA5">曲线图 · 远程升级</text>
  <line x1="340" y1="245" x2="340" y2="273" stroke="#888780" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Core Engine Layer -->
  <rect x="60" y="280" width="560" height="90" rx="16" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <rect x="80" y="296" width="100" height="28" rx="8" fill="#9FE1CB"/>
  <text x="130" y="310" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#0F6E56">核心引擎</text>
  <text x="130" y="352" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#1D9E75" font-weight="500">Engine</text>
  <text x="260" y="330" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" fill="#0F6E56">Modbus RTU 采集 · 批量读优化</text>
  <text x="480" y="330" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" fill="#0F6E56">SQLite 存储 · Excel 配置</text>

  <!-- Modbus RTU label on main trunk -->
  <rect x="300" y="393" width="80" height="20" rx="4" fill="#9FE1CB"/>
  <text x="340" y="403" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" font-weight="500" fill="#0F6E56">Modbus RTU</text>

  <!-- Split arrows: left to direct devices, right to converter -->
  <line x1="340" y1="370" x2="340" y2="390" stroke="#888780" stroke-width="1.5"/>
  <line x1="340" y1="390" x2="200" y2="430" stroke="#888780" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="340" y1="390" x2="480" y2="430" stroke="#BA7517" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Left path: Direct Modbus RTU Devices -->
  <rect x="60" y="440" width="280" height="55" rx="16" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <rect x="80" y="450" width="130" height="28" rx="8" fill="#D3D1C7"/>
  <text x="145" y="464" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" font-weight="500" fill="#5F5E5A">直连 Modbus RTU 设备</text>
  <text x="220" y="479" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#5F5E5A">PLC · 电表 · 传感器 · 变频器 · 温控器</text>

  <!-- Right path: Protocol converter → non-Modbus -->
  <rect x="370" y="440" width="250" height="55" rx="12" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5" stroke-dasharray="4,3"/>
  <rect x="390" y="448" width="100" height="28" rx="8" fill="#FAC775"/>
  <text x="440" y="462" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" font-weight="500" fill="#633806">自购协议转换器</text>
  <text x="470" y="472" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="10" fill="#854F0B">如：西门子PPI · 三菱</text>
  <text x="470" y="486" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="10" fill="#854F0B">→ Modbus RTU</text>

  <line x1="480" y1="495" x2="480" y2="515" stroke="#BA7517" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Right lower: non-Modbus devices -->
  <rect x="370" y="525" width="250" height="45" rx="12" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="495" y="547" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#791F1F">非 Modbus 其他协议设备</text>

  <!-- Labels on arrows -->
  <text x="195" y="420" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="10" fill="#5F5E5A">直接</text>
  <text x="490" y="420" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="10" fill="#854F0B">间接</text>
</svg>